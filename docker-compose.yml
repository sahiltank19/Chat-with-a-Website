services:
  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - chromadb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: chat_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  chroma_data:
